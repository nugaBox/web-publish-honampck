<div class="hn-board-wrap">

  <form id="boardForm" name="boardForm" method="post" enctype="multipart/form-data">
    <input type="hidden" id="action" name="action" value="insert">
    <input type="hidden" id="seq" name="seq" value="">
    <input type="hidden" id="boardId" name="boardId" value="">

    <table class="btable" style="border-top:2px solid var(--hn-text);">
      <colgroup>
        <col style="width:140px">
        <col>
      </colgroup>
      <tbody>
        <tr>
          <th scope="row" style="text-align:left;background:var(--hn-bg-alt);padding:14px 18px;font-size:13px;font-weight:700;color:var(--hn-text-2);">
            분류
          </th>
          <td style="text-align:left;padding:12px 18px;">
            <select name="ctgrySn" class="b-toolbar select" style="min-width:160px;">
              <option value="">분류 선택</option>
              <option value="notice">노회공지</option>
              <option value="urgent">긴급공지</option>
              <option value="recruit">채용공모</option>
              <option value="tender">입찰공고</option>
              <option value="general">교단공지</option>
            </select>
          </td>
        </tr>
        <tr>
          <th scope="row" style="text-align:left;background:var(--hn-bg-alt);padding:14px 18px;font-size:13px;font-weight:700;color:var(--hn-text-2);">
            제목 <span style="color:var(--hn-red);">*</span>
          </th>
          <td style="text-align:left;padding:12px 18px;">
            <input type="text" name="boardSj" placeholder="제목을 입력하세요" required
              style="width:100%;border:1px solid var(--hn-line);padding:9px 14px;font-size:14px;font-family:inherit;outline:0;">
          </td>
        </tr>
        <tr>
          <th scope="row" style="text-align:left;background:var(--hn-bg-alt);padding:14px 18px;font-size:13px;font-weight:700;color:var(--hn-text-2);">
            공지 설정
          </th>
          <td style="text-align:left;padding:12px 18px;font-size:13px;">
            <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;">
              <input type="checkbox" name="noticeAt" value="Y"> 공지로 등록
            </label>
          </td>
        </tr>
        <tr>
          <th scope="row" style="text-align:left;background:var(--hn-bg-alt);padding:14px 18px;font-size:13px;font-weight:700;color:var(--hn-text-2);vertical-align:top;padding-top:20px;">
            본문 <span style="color:var(--hn-red);">*</span>
          </th>
          <td style="text-align:left;padding:12px 18px;">
            <textarea name="boardCn" rows="14" placeholder="내용을 입력하세요"
              style="width:100%;border:1px solid var(--hn-line);padding:12px 14px;font-size:14px;font-family:inherit;outline:0;resize:vertical;"></textarea>
          </td>
        </tr>
        <tr>
          <th scope="row" style="text-align:left;background:var(--hn-bg-alt);padding:14px 18px;font-size:13px;font-weight:700;color:var(--hn-text-2);">
            첨부파일
          </th>
          <td style="text-align:left;padding:12px 18px;font-size:13px;">
            <input type="file" name="file" multiple
              style="border:1px solid var(--hn-line);padding:10px 14px;font-size:13px;width:100%;cursor:pointer;">
            <div style="margin-top:6px;font-size:12px;color:var(--hn-text-3);">
              최대 20MB · PDF, HWP, Word, Excel, 이미지 등
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="btable-foot" style="padding-top:24px;">
      <a href="list.html" class="btn-hn ghost"><i class="fa-regular fa-list"></i> 취소</a>
      <button type="submit" class="btn-hn primary">
        <i class="fa-regular fa-floppy-disk"></i> 등록
      </button>
    </div>
  </form>

</div>
