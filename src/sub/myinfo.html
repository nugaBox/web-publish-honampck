<div data-include="../include/header.html"></div>

<main id="main-content">
    <div class="hn-page-head">
        <div class="inner">
            <div class="breadcrumb-hn">
                <span class="home"
                    ><i class="fa-regular fa-house"></i> HOME</span
                >
                <i class="fa-regular fa-chevron-right"></i>
                <span>부가서비스</span>
                <i class="fa-regular fa-chevron-right"></i>
                <span class="cur">마이페이지</span>
            </div>
            <h1>마이페이지</h1>
            <p class="desc"></p>
        </div>
    </div>
    <div class="sub-layout">
        <div data-include="../include/sidebar_extra.html"></div>
        <section class="content">
            <div class="siiru-userWrap">
                <div class="userWrap">
                    <form
                        id="siiru-userForm"
                        name="siiru-userForm"
                        method="post"
                        enctype="multipart/form-data"
                    >
                        <div class="siiruBoard-write">
                            <dl>
                                <dt>아이디</dt>
                                <dd>
                                    <input
                                        type="text"
                                        id="userId"
                                        name="userId"
                                        value="honampck_user"
                                        class="small2"
                                        readonly
                                    />
                                </dd>
                            </dl>
                            <dl>
                                <dt>
                                    <span>*</span
                                    ><label for="userNm">이름</label>
                                </dt>
                                <dd>
                                    <input
                                        type="text"
                                        id="userNm"
                                        name="userNm"
                                        maxlength="30"
                                        value="홍길동"
                                        class="small2"
                                    />
                                </dd>
                            </dl>
                            <dl>
                                <dt>
                                    <span>*</span
                                    ><label for="email">이메일</label>
                                </dt>
                                <dd>
                                    <input
                                        type="text"
                                        id="email"
                                        name="email"
                                        maxlength="50"
                                        value="example@church.or.kr"
                                    />
                                </dd>
                            </dl>
                            <dl>
                                <dt>
                                    <span>*</span
                                    ><label for="mbtlnum">모바일번호</label>
                                </dt>
                                <dd>
                                    <input
                                        type="text"
                                        id="mbtlnum"
                                        name="mbtlnum"
                                        maxlength="14"
                                        value="010-1234-5678"
                                        class="small2"
                                    />
                                </dd>
                            </dl>
                            <dl>
                                <dt><label for="church">소속(교회)</label></dt>
                                <dd>
                                    <input
                                        type="text"
                                        id="church"
                                        name="church"
                                        maxlength="50"
                                        value="광주새백성교회"
                                        class="small2"
                                    />
                                </dd>
                            </dl>
                            <dl>
                                <dt><label for="position">직분</label></dt>
                                <dd>
                                    <select id="position" name="position">
                                        <option value="">선택</option>
                                        <option value="P">목사</option>
                                        <option value="E">강도사</option>
                                        <option value="M">전도사</option>
                                        <option value="L">장로</option>
                                        <option value="K">권사</option>
                                        <option value="D">집사</option>
                                        <option value="S" selected>성도</option>
                                    </select>
                                </dd>
                            </dl>
                        </div>
                        <div class="siiru-btnSet">
                            <button
                                type="button"
                                id="userSubmit"
                                class="siiru-btn siiru-btn-primary"
                            >
                                정보 수정
                            </button>
                            <a
                                href="passchange.html"
                                class="siiru-btn siiru-ml10"
                                >비밀번호 변경</a
                            >
                            <a
                                href="leave.html"
                                class="siiru-btn siiru-btn-danger siiru-ml10"
                                >회원 탈퇴</a
                            >
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</main>

<div data-include="../include/footer.html"></div>
