<div data-include="../include/header.html"></div>

<main id="main-content">
    <div class="hn-page-head">
        <div class="inner">
            <div class="breadcrumb-hn">
                <span class="home"
                    ><i class="fa-regular fa-house"></i> HOME</span
                >
                <i class="fa-regular fa-chevron-right"></i>
                <span>부가서비스</span>
                <i class="fa-regular fa-chevron-right"></i>
                <span class="cur">아이디/비밀번호 찾기</span>
            </div>
            <h1>아이디/비밀번호 찾기</h1>
            <p class="desc"></p>
        </div>
    </div>
    <div class="sub-layout">
        <div data-include="../include/sidebar_extra.html"></div>
        <section>
            <div class="siiru-findUserWrap">
                <div class="findUserWrap">
                    <div class="alert-hn info">
                        <i class="fa-regular fa-circle-info"></i>
                        <div>
                            가입 당시 입력한 정보를 입력해 주세요.<br />
                            계정 관련 문의는 관리자(노회 서기)에게 문의해 주세요.
                        </div>
                    </div>
                    <div class="findUser-tab">
                        <ul>
                            <li id="fuser-tab-I" class="active">
                                <a href="#" data-pagetp="I">아이디 찾기</a>
                            </li>
                            <li id="fuser-tab-P">
                                <a href="#" data-pagetp="P">비밀번호 찾기</a>
                            </li>
                        </ul>
                    </div>

                    <!-- 아이디 찾기 -->
                    <section id="findSection-I">
                        <div class="retIdMsg" id="retIdMsg"></div>
                        <div class="findLayer">
                            <div class="inputWrap">
                                <form
                                    name="siiru-findIdForm"
                                    id="siiru-findIdForm"
                                    method="post"
                                >
                                    <input
                                        type="hidden"
                                        name="action"
                                        value="I"
                                    />
                                    <dl>
                                        <dt>
                                            <label for="userNm_I">이름</label>
                                        </dt>
                                        <dd>
                                            <input
                                                type="text"
                                                class="small"
                                                id="userNm_I"
                                                name="userNm"
                                                value=""
                                                placeholder="이름 입력"
                                            />
                                        </dd>
                                    </dl>
                                    <dl>
                                        <dt>
                                            <label for="email_I">이메일</label>
                                        </dt>
                                        <dd>
                                            <input
                                                type="text"
                                                id="email_I"
                                                name="email"
                                                value=""
                                                placeholder="example@email.com"
                                            />
                                        </dd>
                                    </dl>
                                </form>
                                <div class="siiru-btnSet siiru-tc">
                                    <button
                                        type="button"
                                        id="findIdBtn"
                                        class="siiru-btn siiru-btn-primary"
                                    >
                                        아이디 찾기
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    <!-- 비밀번호 찾기 -->
                    <section id="findSection-P">
                        <div class="retPassMsg" id="retPassMsg"></div>
                        <div class="findLayer">
                            <div class="inputWrap">
                                <form
                                    name="siiru-findPwForm"
                                    id="siiru-findPwForm"
                                    method="post"
                                >
                                    <input
                                        type="hidden"
                                        name="action"
                                        value="P"
                                    />
                                    <dl>
                                        <dt>
                                            <label for="userId_P">아이디</label>
                                        </dt>
                                        <dd>
                                            <input
                                                type="text"
                                                class="small"
                                                id="userId_P"
                                                name="userId"
                                                value=""
                                                placeholder="아이디 입력"
                                            />
                                        </dd>
                                    </dl>
                                    <dl>
                                        <dt>
                                            <label for="userNm_P">이름</label>
                                        </dt>
                                        <dd>
                                            <input
                                                type="text"
                                                class="small"
                                                id="userNm_P"
                                                name="userNm"
                                                value=""
                                                placeholder="이름 입력"
                                            />
                                        </dd>
                                    </dl>
                                    <dl>
                                        <dt>
                                            <label for="email_P">이메일</label>
                                        </dt>
                                        <dd>
                                            <input
                                                type="text"
                                                id="email_P"
                                                name="email"
                                                value=""
                                                placeholder="example@email.com"
                                            />
                                        </dd>
                                    </dl>
                                </form>
                                <div class="siiru-btnSet siiru-tc">
                                    <button
                                        type="button"
                                        id="findPwBtn"
                                        class="siiru-btn siiru-btn-primary"
                                    >
                                        비밀번호 찾기
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </section>
    </div>
</main>

<div data-include="../include/footer.html"></div>

<script>
    (function () {
        /* 탭 전환 */
        var tabs = document.querySelectorAll(".findUser-tab li a");
        tabs.forEach(function (a) {
            a.addEventListener("click", function (e) {
                e.preventDefault();
                var tp = this.dataset.pagetp;
                ["I", "P"].forEach(function (s) {
                    document.getElementById("findSection-" + s).style.display =
                        s === tp ? "block" : "none";
                    document.getElementById("fuser-tab-" + s).className =
                        s === tp ? "active" : "";
                });
            });
        });

        /* 아이디 찾기 유효성 검사 */
        document
            .getElementById("findIdBtn")
            .addEventListener("click", function () {
                var nm = document.getElementById("userNm_I").value.trim();
                var email = document.getElementById("email_I").value.trim();
                if (!nm) {
                    alert("이름을 입력해 주세요.");
                    document.getElementById("userNm_I").focus();
                    return;
                }
                if (!email) {
                    alert("이메일을 입력해 주세요.");
                    document.getElementById("email_I").focus();
                    return;
                }
            });

        /* 비밀번호 찾기 유효성 검사 */
        document
            .getElementById("findPwBtn")
            .addEventListener("click", function () {
                var userId = document.getElementById("userId_P").value.trim();
                var nm = document.getElementById("userNm_P").value.trim();
                var email = document.getElementById("email_P").value.trim();
                if (!userId) {
                    alert("아이디를 입력해 주세요.");
                    document.getElementById("userId_P").focus();
                    return;
                }
                if (!nm) {
                    alert("이름을 입력해 주세요.");
                    document.getElementById("userNm_P").focus();
                    return;
                }
                if (!email) {
                    alert("이메일을 입력해 주세요.");
                    document.getElementById("email_P").focus();
                    return;
                }
            });
    })();
</script>
