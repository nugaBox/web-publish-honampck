        </div>
        <h1>로그인</h1>
        <p class="desc">호남노회 홈페이지 회원 로그인 페이지입니다.</p>
      </div>
    </div>

    <div class="sub-layout">

      <aside>
        <div class="sidebar-head">

        </div>
        <nav class="sidebar-list">
          <a href="privacy.html"><span>개인정보처리방침</span><i class="fa-regular fa-chevron-right" style="font-size:10px;"></i></a>

      <section class="content">
        <h2 class="ptitle"><span>로그인</span></h2>

        <form action="#" method="post" class="form-box">

          <div class="in-field">
            <label class="in-label" for="userId">아이디</label>
            <input type="text" id="userId" name="userId" class="in-text" placeholder="아이디를 입력하세요" autocomplete="username">
          </div>

          <div class="in-field" style="margin-top:14px;">
            <label class="in-label" for="passwd">비밀번호</label>
            <input type="password" id="passwd" name="passwd" class="in-text" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
          </div>

          <div style="display:flex; align-items:center; gap:8px; margin-top:14px;">
            <input type="checkbox" id="idSave" name="idSave" style="width:16px;height:16px;accent-color:var(--hn-blue);">
            <label for="idSave" style="font-size:15px; color:var(--hn-text-3); cursor:pointer;">아이디 저장</label>
          </div>

          <div class="form-btns">
            <button type="submit" class="btn-hn primary" style="flex:1; justify-content:center; padding:13px;">
              <i class="fa-regular fa-arrow-right-to-bracket"></i> 로그인
            </button>
          </div>

          <div class="form-links">
            <a href="join.html"><i class="fa-regular fa-user-plus"></i> 회원가입</a>
            <a href="finduser.html">아이디/비밀번호 찾기</a>
