<div data-include="../include/header.html"></div>

<main id="main-content">
    <div class="hn-page-head">
        <div class="inner">
            <div class="breadcrumb-hn">
                <span class="home"
                    ><i class="fa-regular fa-house"></i> HOME</span
                >
                <i class="fa-regular fa-chevron-right"></i>
                <span>부가서비스</span>
                <i class="fa-regular fa-chevron-right"></i>
                <span class="cur">회원 탈퇴</span>
            </div>
            <h1>회원 탈퇴</h1>
            <p class="desc"></p>
        </div>
    </div>
    <div class="sub-layout">
        <div data-include="../include/sidebar_extra.html"></div>
        <section>
            <div class="siiru-userWrap">
                <div class="leaveForm">
                    <h4>회원 탈퇴</h4>
                    <div class="findLayer">
                        <div class="inputWrap">
                            <h5>비밀번호를 통한 탈퇴</h5>
                            <div class="leave-warn">
                                <p class="leave-desc">
                                    탈퇴 시 모든 회원 정보와 작성 데이터가 삭제되며
                                    복구할 수 없습니다.<br />
                                    아래에 비밀번호를 입력하고 탈퇴 버튼을
                                    클릭하세요.
                                </p>
                            </div>
                            <form
                                name="siiru-leaveForm"
                                id="siiru-leaveForm"
                                method="post"
                            >
                                <input type="hidden" name="action" value="L" />
                                <input type="hidden" name="siteId" value="" />
                                <input type="hidden" name="pageId" value="" />
                                <div class="pwCert">
                                    <input
                                        type="password"
                                        id="passwd"
                                        name="passwd"
                                        value=""
                                        title="비밀번호"
                                        autocomplete="off"
                                    />
                                </div>
                            </form>
                            <div class="siiru-btnSet siiru-tc">
                                <button
                                    type="button"
                                    id="acceptBtn"
                                    class="siiru-btn siiru-btn-primary"
                                >
                                    회원 탈퇴
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="leaveWrap siiru-hidden">
                    <p>회원탈퇴 처리가 완료되었습니다.</p>
                    <div class="siiru-btnSet siiru-tc">
                        <button
                            type="button"
                            id="mainBtn"
                            class="siiru-btn siiru-btn-primary"
                        >
                            메인화면
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </div>
</main>

<div data-include="../include/footer.html"></div>
