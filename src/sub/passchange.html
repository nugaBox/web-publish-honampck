  <div data-include="../include/header.html"></div>

  <main id="main-content">

    <div class="hn-page-head">
      <div class="inner">
        <div class="breadcrumb-hn">
          <span class="home"><i class="fa-regular fa-house"></i> HOME</span>
          <i class="fa-regular fa-chevron-right"></i>
          <span>부가서비스</span>
          <i class="fa-regular fa-chevron-right"></i>
          <span class="cur">비밀번호변경</span>
        </div>
        <h1>비밀번호변경</h1>
        <p class="desc">현재 비밀번호를 확인한 후 새 비밀번호로 변경할 수 있습니다.</p>
      </div>
    </div>

    <div class="sub-layout">

      <div data-include="../include/sidebar_extra.html"></div>
      <section class="content">

        <form action="#" method="post" class="form-box">

          <div class="alert-hn info" style="margin-bottom:24px;">
            <i class="fa-regular fa-circle-info"></i>
            <div>비밀번호는 <b>영문·숫자·특수문자</b>를 혼합하여 8~20자로 설정해 주세요.</div>
          </div>

          <div class="in-field">
            <label class="in-label" for="curPasswd">현재 비밀번호 <span style="color:var(--hn-red);">*</span></label>
            <input type="password" id="curPasswd" name="curPasswd" class="in-text" placeholder="현재 비밀번호" autocomplete="current-password">
          </div>

          <div class="in-field" style="margin-top:14px;">
            <label class="in-label" for="newPasswd">새 비밀번호 <span style="color:var(--hn-red);">*</span></label>
            <input type="password" id="newPasswd" name="newPasswd" class="in-text" placeholder="새 비밀번호 (8~20자)" autocomplete="new-password">
          </div>

          <div class="in-field" style="margin-top:14px;">
            <label class="in-label" for="newPasswdConfirm">새 비밀번호 확인 <span style="color:var(--hn-red);">*</span></label>
            <input type="password" id="newPasswdConfirm" name="newPasswdConfirm" class="in-text" placeholder="새 비밀번호를 다시 입력하세요" autocomplete="new-password">
          </div>

          <div class="form-btns">
            <button type="submit" class="btn-hn primary" style="flex:1; justify-content:center; padding:13px;">
              <i class="fa-regular fa-lock"></i> 비밀번호 변경
            </button>
            <a href="myinfo.html" class="btn-hn ghost">취소</a>
          </div>

        </form>
      </section>

    </div>
  </main>

  <div data-include="../include/footer.html"></div>
