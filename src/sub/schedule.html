<script>
    if (window.addEventListener)
        window.addEventListener("load", siiruSchdul, false);
    else if (window.attachEvent) window.attachEvent("onload", siiruSchdul);
    else window.onload = siiruSchdul;

    function siiruSchdul() {
        var current = moment ? moment() : null;
        if (!current) return;

        $(".schdul-year").text(current.format("YYYY년 MM월"));
        showCalendar(current.format("YYYY-MM"));

        $(".schdul-prev").click(function (e) {
            e.preventDefault();
            current.add(-1, "months");
            $(".schdul-year").text(current.format("YYYY년 MM월"));
            $(".schdul-result").html("");
            $(".schdul-resultView").html("");
            showCalendar(current.format("YYYY-MM"));
        });
        $(".schdul-next").click(function (e) {
            e.preventDefault();
            current.add(1, "months");
            $(".schdul-year").text(current.format("YYYY년 MM월"));
            $(".schdul-result").html("");
            $(".schdul-resultView").html("");
            showCalendar(current.format("YYYY-MM"));
        });
        $("#calendarTable").on("click", "td a.schedule", function (e) {
            e.preventDefault();
            showDetail($(this).data("dt"));
        });
        $(".schdul-resultView").on("click", ".schdulListBtn", function () {
            $(".schdul-select").show();
            $(".schdul-calendar").show();
            $(".schdul-resultView").html("");
            $("html,body").animate({
                scrollTop: $(".schdul-select").offset().top,
            });
        });
    }

    function showCalendar(yearMonth) {
        $.post("/getSchdul.do", {
            schdulCtgry: $.trim($('input[name="schdulCtgry"]').val()),
            schdulMonth: yearMonth,
        }).done(function (data) {
            if (data.error == "N") {
                var calendar = document
                    .getElementById("calendarTable")
                    .getElementsByTagName("tbody")[0];
                $("#calendarTable tbody tr").remove();
                var map = data.dataMap;
                var firstDayOfWeek = Number(map.dayOfWeek);
                if (firstDayOfWeek == 7) firstDayOfWeek = 0;
                var week =
                    Math.ceil((firstDayOfWeek + Number(map.dayOfMonth)) / 7) +
                    1;
                var leftDays = 7,
                    setDays = 1;
                for (var i = 1; i < week; i++) {
                    var row = calendar.insertRow();
                    while (firstDayOfWeek != 0) {
                        row.insertCell().innerHTML = "";
                        firstDayOfWeek -= 1;
                        leftDays -= 1;
                    }
                    while (leftDays != 0) {
                        var only = true,
                            cell = row.insertCell();
                        if (setDays > Number(map.dayOfMonth)) {
                            cell.innerHTML = "";
                            leftDays -= 1;
                        } else {
                            var fullDay =
                                yearMonth + "-" + numberPad(setDays, 2);
                            var holiday = false,
                                holidayNm = "";
                            $.each(map.holiday, function (k, v) {
                                if ($.trim(v.holiday) == fullDay) {
                                    holidayNm =
                                        "<small>" +
                                        convertHtml($.trim(v.holidayNm)) +
                                        "</small>";
                                    holiday = true;
                                }
                            });
                            var schedule = "";
                            $.each(map.list, function (k, v) {
                                var inRange =
                                    Number(v.endDay) > 0
                                        ? setDays >= Number(v.beginDay) &&
                                          setDays <= Number(v.endDay)
                                        : setDays == Number(v.beginDay);
                                if (inRange) {
                                    schedule +=
                                        '<a href="#" data-dt="' +
                                        fullDay +
                                        '" class="schedule">' +
                                        convertHtml($.trim(v.sj)) +
                                        "</a>";
                                }
                            });
                            var cn = "";
                            var dow = moment(fullDay).day();
                            if (dow == 6) cn = "sat";
                            if (dow == 0) cn = "sun";
                            if (fullDay == moment().format("YYYY-MM-DD"))
                                cn += (cn ? " " : "") + "today";
                            if (holiday) cn += (cn ? " " : "") + "holiday";
                            cell.innerHTML =
                                "<span>" +
                                holidayNm +
                                setDays +
                                "</span>" +
                                schedule;
                            cell.className = cn;
                            setDays += 1;
                            leftDays -= 1;
                        }
                    }
                    leftDays = 7;
                }
            }
        });
    }

    function showDetail(day) {
        $.post("/getSchdul.do", {
            schdulCtgry: $.trim($('input[name="schdulCtgry"]').val()),
            searchSDt: day,
            searchEDt: day,
        }).done(function (data) {
            if (data.error == "N") {
                var map = data.dataMap;
                var html =
                    '<p class="detailDate">' +
                    moment(day).format("YYYY년 MM월 DD일 dddd") +
                    "</p>";
                $.each(map.list, function (k, v) {
                    html += showSchdul("T", v);
                });
                html +=
                    '<div class="siiru-btnSet siiru-tc"><button type="button" class="schdulListBtn siiru-btn">목록</button></div>';
                $(".schdul-resultView").html(html);
                $("html,body").animate(
                    { scrollTop: $(".schdul-resultView").offset().top },
                    100,
                );
            }
        });
    }

    function showSchdul(ty, v) {
        var h =
            '<div class="detail-block"><span>' +
            convertHtml($.trim(v.sj)) +
            "</span>";
        var hasMeta =
            ty == "D" ||
            ($.trim(v.endDe) != "" && $.trim(v.beginDe) != $.trim(v.endDe)) ||
            ($.trim(v.beginTime) != "" && $.trim(v.beginTime) != "00:00") ||
            $.trim(v.place) != "" ||
            $.trim(v.chrgDept) != "";
        if (hasMeta) {
            h += "<dl>";
            if ($.trim(v.beginTime) != "" && $.trim(v.beginTime) != "00:00")
                h +=
                    "<dt>시간</dt><dd>" +
                    $.trim(v.beginTime) +
                    ($.trim(v.endTime) != "" && $.trim(v.endTime) != "00:00"
                        ? " ~ " + $.trim(v.endTime)
                        : "") +
                    "</dd>";
            if ($.trim(v.endDe) != "" && $.trim(v.beginDe) != $.trim(v.endDe))
                h +=
                    "<dt>기간</dt><dd>" +
                    $.trim(v.beginDe) +
                    " ~ " +
                    $.trim(v.endDe) +
                    "</dd>";
            if ($.trim(v.place) != "")
                h +=
                    "<dt>장소</dt><dd>" +
                    convertHtml($.trim(v.place)) +
                    "</dd>";
            if ($.trim(v.chrgDept) != "")
                h +=
                    "<dt>담당</dt><dd>" +
                    convertHtml($.trim(v.chrgDept)) +
                    "</dd>";
            h += "</dl>";
        }
        if (Number($.trim(v.fileCnt)) > 0) {
            h += "<ul>";
            $.each(v.fileList, function (k, f) {
                h +=
                    '<li><a href="' +
                    $.trim(f.fileUrl) +
                    '">' +
                    $.trim(f.fileNm) +
                    "</a></li>";
            });
            h += "</ul>";
        }
        h += "</div>";
        return h;
    }
</script>
