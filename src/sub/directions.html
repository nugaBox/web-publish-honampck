<head>

  <link rel="icon" type="image/svg+xml" href="../assets/images/common/favicon/favicon.svg" />

  <link rel="apple-touch-icon" sizes="180x180" href="../assets/images/common/favicon/apple-touch-icon.png" />

</head>
<body>

  <div data-include="../include/header.html"></div>

  <main id="main-content">

    <div class="hn-page-head">
      <div class="inner">
        <div class="breadcrumb-hn">
          <span class="home"><i class="fa-regular fa-house"></i> HOME</span>
          <i class="fa-regular fa-chevron-right"></i>
          <span>노회 소개</span>
          <i class="fa-regular fa-chevron-right"></i>
          <span class="cur">오시는 길</span>
        </div>
        <h1>오시는 길</h1>
        <p class="desc">오시는 길을 안내합니다.</p>
      </div>
    </div>

    <div class="sub-layout">

      <aside>
        <div class="sidebar-head">
          <div class="k">INTRO</div>
          <h3>노회 소개</h3>
        </div>
        <nav class="sidebar-list">
          <a href="intro.html">
            <span>노회 소개</span>
            <i class="fa-regular fa-chevron-right" style="font-size:10px;"></i>
          </a>
          <a href="officers.html">
            <span>임원 구성</span>
            <i class="fa-regular fa-chevron-right" style="font-size:10px;"></i>
          </a>
          <a href="rules.html">
            <span>노회 규칙</span>
            <i class="fa-regular fa-chevron-right" style="font-size:10px;"></i>
          </a>
          <a href="directions.html" class="on">
            <span>오시는 길</span>
            <span></span>
          </a>
        </nav></aside>

      <section class="content">

        <h2 class="ptitle">오시는 길</h2>
        
        <!-- 주소 배너 -->
        <div class="directions-addr">
          <i class="fa-regular fa-location-dot"></i>
          <div>
            <div class="addr-text">[58259] 전남 나주시 예향로 4172</div>
            <div class="addr-sub">노회 사무실 (에벤에셀교회)</div>
          </div>
        </div>

        <!-- 네이버 지도 -->
        <div class="map-wrap">
          <div id="naver-map" style="width:100%;height:100%;min-height:300px;"></div>
        </div>

        <!-- 교통 안내 -->
        <div class="directions-info">
          <div class="di-card">
            <h4><i class="fa-regular fa-car-side"></i> 교통편</h4>
            <ul>
              <li>내비게이션에서 "에벤에셀교회" 검색</li>
              <li>도로명 주소 : 전남 나주시 예향로 4172</li>
              <li>지번 주소 : 전남 나주시 송월동 676</li>
            </ul>
          </div>
          <div class="di-card">
            <h4><i class="fa-regular fa-clock"></i> 노회 사무실</h4>
            <ul>
              <li>노회 회의 및 운영을 위해 <br>에벤에셀교회에서 제공하는 장소입니다.</li>
              <li>각종 사무 업무는 노회 서기에게 문의하시기 바랍니다.</li>
            </ul>
          </div>
        </div>

      </section>

    </div>
  </main>

  <div data-include="../include/footer.html"></div>

  <script src="../assets/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/script.js"></script>
  <script src="../assets/js/sub.js"></script>
  <script>
    (function () {
      var TARGET_ADDRESS = '전남 나주시 예향로 4172';
      var MARKER_TITLE   = '에벤에셀교회';
      var FALLBACK_LAT   = 35.0160;
      var FALLBACK_LNG   = 126.7107;

      function initMap(position) {
        var map = new naver.maps.Map('naver-map', {
          center: position,
          zoom: 17
        });
        new naver.maps.Marker({
          position: position,
          map: map,
          title: MARKER_TITLE
        });
      }

      naver.maps.Service.geocode({ query: TARGET_ADDRESS }, function (status, response) {
        if (status !== naver.maps.Service.Status.OK || !response.v2.addresses.length) {
          initMap(new naver.maps.LatLng(FALLBACK_LAT, FALLBACK_LNG));
          return;
        }
        var addr = response.v2.addresses[0];
        initMap(new naver.maps.LatLng(parseFloat(addr.y), parseFloat(addr.x)));
      });
    })();
  </script>
</body>
</html>
